name: CraftSupplyLog
options:
  bundleIdPrefix: com.shimondeitel.craftsupplylog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  CraftSupplyLog:
    type: application
    platform: iOS
    sources:
      - path: CraftSupplyLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.craftsupplylog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: CraftSupplyLog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  CraftSupplyLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CraftSupplyLogTests
      - path: CraftSupplyLog.storekit
    dependencies:
      - target: CraftSupplyLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.craftsupplylog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  CraftSupplyLogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: CraftSupplyLogUITests
    dependencies:
      - target: CraftSupplyLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.craftsupplylog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  CraftSupplyLog:
    build:
      targets:
        CraftSupplyLog: all
        CraftSupplyLogTests: [test]
        CraftSupplyLogUITests: [test]
    test:
      targets:
        - CraftSupplyLogTests
        - CraftSupplyLogUITests
